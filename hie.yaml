    - path: "./domain-app/app/Main.hs"
      component: "domain-app:exe:mytest"
    - path: "./domain-app/app/CurrentAst.hs"
      component: "domain-app:exe:mytest"
    - path: "./domain-app/app/CurrentEffects.hs"
      component: "domain-app:exe:mytest"
    - path: "./domain-app/app/InterpretConfig.hs"
      component: "domain-app:exe:mytest"
    - path: "./domain-app/app/RuntimeSmoke.hs"
      component: "domain-app:exe:runtime-smoke"
    - path: "./domain-app/app/FrontendBoundarySmoke.hs"
      component: "domain-app:exe:frontend-boundary-smoke"
    - path: "./domain-app/app/CoreBoundarySmoke.hs"
      component: "domain-app:exe:core-boundary-smoke"
